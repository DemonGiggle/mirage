version: v1
name: hermes-agent
description: Hermes Agent rootfs template with Python, Node.js, git, ripgrep, ffmpeg, and common shell/runtime data.
directories:
    - path: /proc
      mode: 493
    - path: /tmp
      mode: 1023
    - path: /run
      mode: 493
    - path: /workspace
      mode: 493
    - path: /etc/ssl/certs
      mode: 493
    - path: /home
      mode: 493
