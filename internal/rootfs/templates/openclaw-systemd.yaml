version: v1
name: openclaw-systemd
description: OpenClaw-oriented rootfs template with guest systemd tooling and systemd-ready directories.
directories:
    - path: /proc
      mode: 493
    - path: /tmp
      mode: 1023
    - path: /run
      mode: 493
    - path: /workspace
      mode: 493
    - path: /etc/ssl/certs
      mode: 493
    - path: /home
      mode: 493
    - path: /dev
      mode: 493
    - path: /sys
      mode: 493
    - path: /sys/fs/cgroup
      mode: 493
    - path: /etc/systemd/system
      mode: 493
    - path: /usr/lib/systemd/system
      mode: 493
    - path: /var/lib/systemd
      mode: 493
    - path: /var/log/journal
      mode: 493
binaries:
    - target_path: /bin/sh
      lookup_name: sh
      copy_dependencies: true
    - target_path: /bin/ls
      lookup_name: ls
      copy_dependencies: true
    - target_path: /bin/cat
      lookup_name: cat
      copy_dependencies: true
    - target_path: /bin/mkdir
      lookup_name: mkdir
      copy_dependencies: true
    - target_path: /bin/pwd
      lookup_name: pwd
      copy_dependencies: true
    - target_path: /bin/rm
      lookup_name: rm
      copy_dependencies: true
    - target_path: /bin/true
      lookup_name: "true"
      copy_dependencies: true
    - target_path: /bin/false
      lookup_name: "false"
      copy_dependencies: true
    - target_path: /usr/bin/env
      lookup_name: env
      copy_dependencies: true
    - target_path: /usr/bin/node
      lookup_name: node
      copy_dependencies: true
    - target_path: /usr/bin/npm
      lookup_name: npm
      copy_dependencies: true
    - target_path: /usr/bin/npx
      lookup_name: npx
      copy_dependencies: true
    - target_path: /bin/bash
      lookup_name: bash
      copy_dependencies: true
    - target_path: /usr/bin/git
      lookup_name: git
      copy_dependencies: true
    - target_path: /usr/bin/systemd
      lookup_name: systemd
      copy_dependencies: true
    - target_path: /usr/bin/systemctl
      lookup_name: systemctl
      copy_dependencies: true
    - target_path: /usr/bin/journalctl
      lookup_name: journalctl
      copy_dependencies: true
    - target_path: /usr/bin/systemd-tmpfiles
      lookup_name: systemd-tmpfiles
      copy_dependencies: true
runtime_files:
    - host_path: /etc/hosts
      target_path: /etc/hosts
    - host_path: /etc/resolv.conf
      target_path: /etc/resolv.conf
    - host_path: /etc/nsswitch.conf
      target_path: /etc/nsswitch.conf
    - host_path: /etc/ssl/certs/ca-certificates.crt
      target_path: /etc/ssl/certs/ca-certificates.crt
      optional: true
    - host_path: /etc/ssl/cert.pem
      target_path: /etc/ssl/cert.pem
      optional: true
    - host_path: /etc/pki/tls/certs/ca-bundle.crt
      target_path: /etc/pki/tls/certs/ca-bundle.crt
      optional: true
    - host_path: /etc/passwd
      target_path: /etc/passwd
    - host_path: /etc/group
      target_path: /etc/group
    - host_path: /etc/os-release
      target_path: /etc/os-release
      optional: true
generated_files:
    - target_path: /etc/machine-id
      mode: 420
