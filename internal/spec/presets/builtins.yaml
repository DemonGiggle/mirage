presets:
  - name: allow-all
    networkPolicy:
      version: 1
      loopback:
        default: allow
      ingress:
        default: allow
        rules: []
      egress:
        default: allow
        rules: []
    description: Allow all ingress and egress traffic.

  - name: offline
    networkPolicy:
      version: 1
      loopback:
        default: allow
      ingress:
        default: deny
        rules: []
      egress:
        default: deny
        rules: []
    description: No network access.

  - name: openclaw-offline
    networkPolicy:
      version: 1
      loopback:
        default: allow
      ingress:
        default: deny
        rules: []
      egress:
        default: deny
        rules: []
    rootfs:
      template: openclaw-developer
      required_commands:
        - node
      recommended_cwd: /workspace
    description: OpenClaw-oriented offline preset for local-only agent work.
