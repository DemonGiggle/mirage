name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: go test ./...

      - name: Build mirage
        run: |
          mkdir -p ./bin ./dist
          go build -o ./bin/mirage ./cmd/mirage

      - name: Package release bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          : > ./dist/SHA256SUMS.txt
          for arch in x86_64 arm64 arm32 riscv64; do
            archive="./dist/mirage-${version}-linux-${arch}.tar.gz"
            ./bin/mirage package --output "${archive}" --arch "${arch}"
            (
              cd ./dist
              sha256sum "$(basename "${archive}")" >> SHA256SUMS.txt
            )
          done

      - name: Write release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          archives=(
            "mirage-${version}-linux-x86_64.tar.gz"
            "mirage-${version}-linux-arm64.tar.gz"
            "mirage-${version}-linux-arm32.tar.gz"
            "mirage-${version}-linux-riscv64.tar.gz"
          )
          archive_list=""
          for archive in "${archives[@]}"; do
            archive_list+="- \`${archive}\`"$'\n'
          done
          cat > ./dist/release-notes.md <<EOF
          ## Release bundle

          This release publishes the standalone Mirage packages generated by \`mirage package\`.

          Published archives:

          ${archive_list}

          Each archive includes:

          - \`bin/mirage\`
          - \`share/mirage/network-policies\`
          - \`share/mirage/presets\`

          Verify the download:

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          Extract the bundle:

          \`\`\`bash
          tar -xzf mirage-${version}-linux-x86_64.tar.gz
          \`\`\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/SHA256SUMS.txt
          body_path: ./dist/release-notes.md
          generate_release_notes: true
