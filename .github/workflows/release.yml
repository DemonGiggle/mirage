name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: go test ./...

      - name: Build mirage
        run: |
          mkdir -p ./bin ./dist
          go build -o ./bin/mirage ./cmd/mirage

      - name: Package release bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          archive="./dist/mirage-${version}-linux-amd64.tar.gz"
          ./bin/mirage package --output "${archive}" --binary ./bin/mirage
          (
            cd ./dist
            sha256sum "$(basename "${archive}")" > SHA256SUMS.txt
          )

      - name: Write release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          archive="mirage-${version}-linux-amd64.tar.gz"
          cat > ./dist/release-notes.md <<EOF
          ## Release bundle

          This release publishes the standalone Mirage package generated by \`mirage package\`.

          Included in \`${archive}\`:

          - \`bin/mirage\`
          - \`share/mirage/network-policies\`
          - \`share/mirage/presets\`

          Verify the download:

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          Extract the bundle:

          \`\`\`bash
          tar -xzf ${archive}
          \`\`\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/SHA256SUMS.txt
          body_path: ./dist/release-notes.md
          generate_release_notes: true
